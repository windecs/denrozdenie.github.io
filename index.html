<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма отправки</title>
    <!-- 1. ПОДКЛЮЧАЕМ БИБЛИОТЕКУ -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
</head>
<body>

    <!-- 2. САМА ФОРМА (Она должна быть здесь, чтобы кнопка появилась) -->
    <div style="padding: 20px; text-align: center;">
        <h2>Отправить сообщение</h2>
        <form id="form">
            <input type="text" name="from_name" placeholder="Ваше имя" required style="margin-bottom: 10px; padding: 5px;"><br>
            <textarea name="message" placeholder="Сообщение" required style="margin-bottom: 10px; padding: 5px;"></textarea><br>
            <input type="submit" id="button" value="Отправить" style="padding: 10px 20px; cursor: pointer;">
        </form>
    </div>

    <!-- 3. НАСТРОЙКИ EMAILJS -->
    <script type="text/javascript">
      (function() {
          // Ваш Public Key
          emailjs.init({
            publicKey: "HtYE1Fe2UojNHBMOo",
          });
      })();

      window.onload = function() {
          const btn = document.getElementById('button');
          const form = document.getElementById('form');

          if (form) {
              form.addEventListener('submit', function(event) {
                  event.preventDefault();
                  
                  if (btn) btn.value = 'Отправка...';

                  // Ваши Service ID и Template ID
                  emailjs.sendForm('service_7awq98i', 'template_uf52wx1', this)
                      .then(() => {
                          if (btn) btn.value = 'Отправлено!';
                          alert('Успешно отправлено!');
                          form.reset();
                      }, (err) => {
                          if (btn) btn.value = 'Ошибка';
                          alert('Ошибка: ' + JSON.stringify(err));
                      });
              });
          }
      };
    </script>

</body>
</html>

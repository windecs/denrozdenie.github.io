<!DOCTYPE html>
<html>
<head>
    <title>Мой сайт</title>
</head>
<body>

    <!-- Ваш контент (формы, кнопки, текст) -->
    <form id="form">
        <input type="text" name="from_name" placeholder="Ваше имя">
        <button id="button" type="submit">Отправить</button>
    </form>

    <!-- ИСПРАВЛЕНИЕ ОШИБКИ (ВСТАВЛЯТЬ СЮДА): -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    
    <script type="text/javascript">
      (function() {
          // Инициализация (замените на ваш Public Key)
          emailjs.init({
            publicKey: "HtYE1Fe2UojNHBMOo",
          });
      })();

      // Ваш код, который вызывал ошибку на 15-й строке
      window.onload = function() {
          const btn = document.getElementById('button');

          document.getElementById('form')
           .addEventListener('submit', function(event) {
             event.preventDefault();
             btn.innerText = 'Отправка...';

             emailjs.sendForm('service_7awq98i', 'template_uf52wx1', this)
              .then(() => {
                btn.innerText = 'Отправлено!';
                alert('Успех!');
              }, (err) => {
                btn.innerText = 'Ошибка';
                alert(JSON.stringify(err));
              });
          });
      };
    </script>
</body>
</html>

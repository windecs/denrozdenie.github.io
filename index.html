<!-- 1. Подключаем библиотеку (вставьте это в <head>, если еще нет) -->
<script type="text/javascript" src="https://cdn.jsdelivr.net"></script>

<!-- 2. Основной скрипт с вашими данными -->
<script type="text/javascript">
  (function() {
    // Инициализация вашим Public Key
    emailjs.init({
      publicKey: "HtYE1Fe2UojNHBMOo",
    });
  })();

  window.onload = function() {
    const btn = document.getElementById('button');
    const form = document.getElementById('form');

    if (form) {
      form.addEventListener('submit', function(event) {
        event.preventDefault();

        if (btn) btn.value = 'Отправка...';

        // Отправка с вашими ID
        emailjs.sendForm('service_7awq98i', 'template_uf52wx1', this)
          .then(() => {
            if (btn) btn.value = 'Отправлено!';
            alert('Сообщение успешно отправлено!');
            form.reset(); // Очистить форму после успеха
          }, (err) => {
            if (btn) btn.value = 'Ошибка';
            alert('Ошибка при отправке: ' + JSON.stringify(err));
          });
      });
    }
  };
</script>

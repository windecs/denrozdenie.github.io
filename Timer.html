<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таймер до 1 июня</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .timer { display: flex; gap: 15px; }
        .unit {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            min-width: 90px;
            text-align: center;
        }
        .num {
            display: block;
            font-size: 3rem;
            font-weight: 800;
            color: #3498db;
        }
        .text {
            color: #7f8c8d;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>До 1 июня осталось:</h1>

    <div class="timer">
        <div class="unit">
            <span class="num" id="days">00</span>
            <span class="text">Дней</span>
        </div>
        <div class="unit">
            <span class="num" id="hours">00</span>
            <span class="text">Часов</span>
        </div>
        <div class="unit">
            <span class="num" id="mins">00</span>
            <span class="text">Минут</span>
        </div>
        <div class="unit">
            <span class="num" id="secs">00</span>
            <span class="text">Секунд</span>
        </div>
    </div>

    <script>
        function updateTimer() {
            const now = new Date();
            let year = now.getFullYear();
            
            // Устанавливаем цель: 1 июня текущего года
            let target = new Date(year, 5, 1); // Месяцы в JS начинаются с 0 (5 = Июнь)

            // Если 1 июня в этом году уже наступило, ставим цель на следующий год
            if (now > target) {
                target = new Date(year + 1, 5, 1);
            }

            const diff = target - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
            document.getElementById('secs').innerText = s < 10 ? '0' + s : s;
        }

        setInterval(updateTimer, 1000);
        updateTimer(); // Запуск сразу
    </script>
</body>
</html>
